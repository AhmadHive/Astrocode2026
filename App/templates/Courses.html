{% extends 'base.html' %}
{% load static %}

{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Space+Mono&display=swap');

    :root {
        --cyan-glow: #00d2ff;
        --purple-glow: #bc13fe;
        --dark-bg: #050505;
    }

    body {
        background-color: var(--dark-bg);
        color: white;
        font-family: 'Space Mono', monospace;
        overflow-x: hidden;
    }

    .courses-header {
        padding: 80px 15px 40px; /* تقليل الحواف للهاتف */
        text-align: center;
        background: linear-gradient(to bottom, rgba(0, 210, 255, 0.05), transparent);
    }

    .cyber-title {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(1.8rem, 8vw, 4rem); /* حجم مرن جداً */
        text-transform: uppercase;
        letter-spacing: 4px; /* تقليل المسافات للهاتف */
        color: #fff;
        text-shadow: 0 0 15px var(--cyan-glow);
        margin-bottom: 15px;
    }

    @media (min-width: 768px) {
        .cyber-title { letter-spacing: 10px; }
        .courses-header { padding: 120px 20px 60px; }
    }

    .course-grid {
        display: grid;
        /* استخدام auto-fill بدلاً من auto-fit لضمان شكل متسق */
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
        gap: 20px;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
    }

    @media (min-width: 768px) {
        .course-grid { 
            gap: 30px;
            padding: 40px;
        }
    }

    .course-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(0, 210, 255, 0.1);
        padding: 20px; /* تقليل الحشو الداخلي في الموبايل */
        position: relative;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        overflow: hidden;
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    @media (min-width: 768px) {
        .course-card { padding: 30px; }
    }

    .course-card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        margin-bottom: 15px;
        border-radius: 6px;
    }

    .course-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 2px;
        background: var(--cyan-glow);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.4s ease;
    }

    .course-card:hover {
        border-color: var(--cyan-glow);
        transform: translateY(-8px);
        box-shadow: 0 10px 30px rgba(0, 210, 255, 0.1);
    }

    .course-card:hover::before {
        transform: scaleX(1);
    }

    .instructor-name {
        font-family: 'Orbitron', sans-serif;
        color: var(--cyan-glow);
        font-size: 1rem;
        margin-bottom: 8px;
        display: block;
    }

    .course-name {
        font-size: 1.25rem;
        font-weight: 900;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        line-height: 1.3;
    }

    @media (min-width: 768px) {
        .course-name { font-size: 1.5rem; }
    }

    .instructor-bio {
        font-size: 0.85rem;
        color: #aaa;
        line-height: 1.5;
        margin-bottom: 20px;
        border-left: 2px solid rgba(255, 255, 255, 0.1);
        padding-left: 12px;
        flex-grow: 1; /* جعل الوصف يأخذ المساحة المتبقية لتوحيد حجم البطاقات */
    }

    .course-meta {
        display: flex;
        flex-wrap: wrap; /* السماح للعناصر بالنزول لسطر جديد في الشاشات الصغيرة جداً */
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-top: auto;
        padding-top: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .time-tag {
        background: rgba(0, 210, 255, 0.1);
        color: var(--cyan-glow);
        padding: 4px 10px;
        font-size: 0.75rem;
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .status-dot {
        width: 6px;
        height: 6px;
        background: var(--cyan-glow);
        border-radius: 50%;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.4); opacity: 0.5; }
        100% { transform: scale(1); opacity: 1; }
    }

    .reveal-item {
        opacity: 0;
        filter: blur(10px);
        transform: translateY(20px);
    }
</style>

<section class="min-h-screen">
    <div class="courses-header">
        <h1 class="cyber-title">Available Courses</h1>
        <p class="mono text-cyan-400/60 text-xs md:text-sm">> SESSION_LIST_2026_UPDATED</p>
    </div>

    <div class="course-grid" id="courseContainer"></div>
</section>

<script>
    const coursesData = [
        {
            courseTitle: "Robotics design and programming",
            instructor: "Khaled Ahmad",
            bio: "Robotics and AI Trainer & Mechatronics Engineer | Founder Of RoboMind",
            time: "13 MAY 2026 11:30 AM - 1:00 PM ",
            status: "in Amman Arab University",
            image: "https://res.cloudinary.com/diadkkzve/image/upload/v1777669581/19_dx3irf.png"
        },
        {
            courseTitle: "Smart Web Apps with AI Agents",
            instructor: "Mohammad Yacoub",
            bio: "Founder of CODEgy | Senior Full-Stack .NET Developer | Oracle & SQL ServerExpert | Technical Trainer & IT Consultant",
            time: "T19 MAY 2026 11:30 AM - 1:00 PM ",
            status: "in Amman Arab University",
            image: "https://res.cloudinary.com/diadkkzve/image/upload/v1777669581/20_kswvyx.png"
        },
        {
            courseTitle: "Space and Aerospace Systems",
            instructor: "Mohamad Abu Amsha",
            bio: "Aircraft Maintenance Engineer || Chairman of IEEE AESS AAU || Student Sectional Representative AESS Jordan Chapter",
            time: "16 MAY 2026 11:30 AM - 1:00 PM ",
            status: "Workshop",
            image: "https://res.cloudinary.com/diadkkzve/image/upload/v1777669583/32_pzqlfv.png"
        },
         {
            courseTitle: "Smart Web Apps with AI Agents",
            instructor: "Mohammad Yacoub",
            bio: "Founder of CODEgy | Senior Full-Stack .NET Developer | Oracle & SQL ServerExpert | Technical Trainer & IT Consultant",
            time: "T19 MAY 2026 11:30 AM - 1:00 PM ",
            status: "in Amman Arab University",
            image: "https://res.cloudinary.com/diadkkzve/image/upload/v1777669581/20_kswvyx.png"
        }
    ];

    function loadCourses() {
        const container = document.getElementById('courseContainer');
        
        coursesData.forEach(course => {
            const card = document.createElement('div');
            card.className = 'course-card reveal-item';
            card.innerHTML = `
                <img src="${course.image}" alt="${course.courseTitle}">
                <span class="instructor-name">// ${course.instructor}</span>
                <h2 class="course-name">${course.courseTitle}</h2>
                <p class="instructor-bio">${course.bio}</p>
                <div class="course-meta">
                    <div class="time-tag">
                        <span class="status-dot"></span>
                        ${course.time}
                    </div>
                    <span class="mono text-[9px] md:text-[10px] opacity-40 uppercase">${course.status}</span>
                </div>
            `;
            container.appendChild(card);
        });

        gsap.to(".reveal-item", {
            opacity: 1,
            filter: "blur(0px)",
            y: 0,
            duration: 0.8,
            stagger: 0.15,
            ease: "power2.out"
        });
    }

    window.onload = loadCourses;
</script>
{% endblock %}
