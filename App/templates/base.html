<!DOCTYPE html>
<html lang="ar" dir="rtl" class="bg-[#020408] selection:bg-cyan-500/30">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRO CODE 2026 | Mission Control</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --pulsar: #00D2FF;
            --void: #020408;
        }

        body {
            background-color: var(--void);
            font-family: 'Space Grotesk', sans-serif;
            color: white;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(123, 31, 162, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 210, 255, 0.08) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .hull-border {
            clip-path: polygon(20px 0%, 100% 0%, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0% 100%, 0% 20px);
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(0,210,255,0.01) 100%);
            border: 1px solid rgba(0, 210, 255, 0.15);
            backdrop-filter: blur(15px);
        }

        main {
            background: transparent !important;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--void); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 210, 255, 0.2); }
        ::-webkit-scrollbar-thumb:hover { background: var(--pulsar); }
    </style>
</head>
<body class="antialiased">
    <canvas id="starfield" class="fixed inset-0 z-[-2]"></canvas>

    <nav class="fixed top-0 w-full z-50 p-6">
        <div class="max-w-7xl mx-auto flex flex-col gap-4 px-8 py-4 hull-border">

            <!-- Logo -->
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-2 h-2 bg-cyan-400 animate-pulse rounded-full shadow-[0_0_10px_#00D2FF]"></div>
                    <a href="{% url 'home' %}" class="group">
                        <h1 class="text-xl font-bold tracking-[0.4em] uppercase mono text-cyan-400">
                            Astro_Code <span class="text-white/30 group-hover:text-white transition-colors duration-500">2026</span>
                        </h1>
                    </a>
                </div>

                <div class="flex gap-4 items-center mono text-sm tracking-widest uppercase">
                    {% if user.is_authenticated %}
                        <a href="{% url 'submission' %}" class="text-cyan-400 hover:text-white transition">
                            Submit
                        </a>
                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button class="text-red-400 hover:text-white transition">
                                Logout
                            </button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-gray-400 hover:text-cyan-400">Login</a>
                        <a href="{% url 'signup' %}" class="px-4 py-1 bg-white text-black font-bold hover:bg-cyan-400">Join</a>
                    {% endif %}
                </div>
            </div>

            <!-- Navigation Links -->
            <div class="flex flex-wrap justify-center gap-6 mono text-sm md:text-base tracking-wider uppercase">
                <a href="{% url 'home' %}" class="hover:text-cyan-400 transition">Home</a>
                <a href="{% url 'Courses' %}" class="hover:text-cyan-400 transition">Courses</a>
                <a href="{% url 'AstroCode2025' %}" class="hover:text-cyan-400 transition">AstroCode 2025</a>
                <a href="{% url 'Committee_Competitio' %}" class="hover:text-cyan-400 transition">Committee</a>
                <a href="{% url 'tracks_list' %}" class="hover:text-cyan-400 transition">Tracks</a>
                <a href="{% url 'submission' %}" class="hover:text-cyan-400 transition">Submit</a>
            </div>

        </div>
    </nav>

    <main class="relative z-10 pt-40 min-h-screen">
        {% block content %}{% endblock %}
    </main>

    <footer class="relative z-10 p-10 border-t border-white/5 bg-black/40 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="mono text-[9px] text-gray-600 tracking-[0.3em] uppercase">
                &copy; 2026 IEEE AAU | ORBITAL_STATION_JOR
            </div>
            <div class="flex gap-6 text-gray-500 mono text-[9px] uppercase tracking-widest">
                <span class="text-cyan-500/50">System_Stable</span>
                <span>Latency: 24ms</span>
            </div>
        </div>
    </footer>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<180; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.3,
                    speed: Math.random() * 0.2 + 0.05,
                    opacity: Math.random()
                });
            }
        }

        function drawNebulaGlow() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, canvas.width * 0.8);
            grad.addColorStop(0, 'rgba(20, 10, 40, 0.4)');
            grad.addColorStop(0.5, 'rgba(5, 15, 30, 0.2)');
            grad.addColorStop(1, 'transparent');
            
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function animate() {
            ctx.fillStyle = '#020408';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawNebulaGlow();

            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                
                s.y -= s.speed;
                if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initStars);
        initStars();
        animate();

        gsap.from("nav", {
            y: -50,
            opacity: 0,
            duration: 1.2,
            ease: "power3.out"
        });
    </script>
</body>
</html>
