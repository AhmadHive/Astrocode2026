<!DOCTYPE html>
<html lang="ar" dir="rtl" class="selection:bg-cyan-500/30">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRO CODE 2026 | Mission Control</title>
    
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/diadkkzve/image/upload/v1778842361/Screenshot_2026-05-15_135146_be9g6z.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* تعريف الخط BABAPRO FONT BOLD */
        @font-face {
            font-family: 'BABAPRO FONT BOLD';
            src: local('BABAPRO FONT BOLD'), local('Bauhaus'), sans-serif;
        }

        :root {
            --pulsar: #00D2FF;
            --void: #000000; /* سواد مطلق لأقصى درجة */
        }

        body {
            background-color: var(--void);
            /* إنشاء نجوم ساطعة وحادة جداً كأنها نقاط ألماس */
            background-image: 
                radial-gradient(1.5px 1.5px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 100px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.2px 1.2px at 180px 250px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 300px 100px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 350px 300px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 400px 400px; /* توزيع متوازن للنجوم */
            background-attachment: fixed;

            font-family: 'BABAPRO FONT BOLD', sans-serif;
            color: white;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .mono { font-family: 'BABAPRO FONT BOLD', sans-serif; }

        /* تصميم الإطارات الزجاجية المشعة */
        .hull-border {
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(0, 210, 255, 0.6) !important;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.15);
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px);
        }

        .nav-container {
            max-width: 80rem;
            margin: 0 auto;
        }

        /* حل مشكلة المستطيل الأسود: إجبار كافة الحاويات على الشفافية */
        main, main *, section, section *, .container, .container * {
            background-color: transparent !important;
        }

        /* استثناء العناصر التي تحتاج لون خلفية لتعمل */
        button, a.px-3, .hull-border, .hull-border *, input {
            background-color: initial !important;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--void); }
        ::-webkit-scrollbar-thumb { background: var(--pulsar); }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 p-4 md:p-6">
        <div class="nav-container flex flex-col gap-4 px-4 md:px-8 py-4 hull-border">

            <div class="flex justify-between items-center w-full">
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="w-2 h-2 bg-cyan-400 animate-pulse rounded-full shadow-[0_0_10px_#00D2FF]"></div>
                    <a href="{% url 'home' %}" class="group">
                        <h1 class="text-sm md:text-xl font-bold tracking-[0.2em] md:tracking-[0.4em] uppercase mono text-cyan-400">
                            Astro_Code <span class="text-white/30 group-hover:text-white transition-colors duration-500">2026</span>
                        </h1>
                    </a>
                </div>

                <div class="flex gap-3 md:gap-4 items-center mono text-[10px] md:text-sm tracking-widest uppercase">
                    {% if user.is_authenticated %}
                        {% else %}
                        {% endif %}
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-x-4 gap-y-2 md:gap-6 mono text-[10px] md:text-base tracking-wider uppercase border-t border-white/5 pt-3 md:pt-0 md:border-none">
                <a href="{% url 'tracks_list' %}" class="hover:text-cyan-400 transition">Tracks</a>
                <a href="{% url 'Courses' %}" class="hover:text-cyan-400 transition">Courses</a>
                <a href="{% url 'AstroCode2025' %}" class="hover:text-cyan-400 transition whitespace-nowrap">AstroCode 2025</a>
                <a href="{% url 'Committee_Competitio' %}" class="hover:text-cyan-400 transition">Committee</a>
                <a href="{% url 'home' %}" class="hover:text-cyan-400 transition">Home</a>
            </div>

        </div>
    </nav>

    <main class="relative z-10 pt-48 min-h-screen px-4 md:px-0">
        <div class="max-w-7xl mx-auto flex flex-col items-center">
            
            <div class="relative w-full pb-6 flex items-center justify-center overflow-hidden z-20" id="mainContainer">
                <div class="relative group w-full max-w-[1060px] flex justify-center">
                    <div class="absolute -inset-5 bg-cyan-500/5 blur-[60px] rounded-full pointer-events-none"></div>
                    
                    <img src="https://res.cloudinary.com/diadkkzve/image/upload/v1778842361/Screenshot_2026-05-15_135146_be9g6z.png" 
                         alt="AstroCode Logo" 
                         class="relative w-full h-auto rounded-2xl shadow-[0_0_50px_rgba(0,0,0,0.8)] transition-transform duration-1000 ease-out group-hover:scale-[1.02]">
                </div>
            </div>

            <div class="w-full">
                {% block content %}
                {% endblock %}
            </div>

        </div>
    </main>

    <footer class="relative z-20 p-6 md:p-10 border-t border-cyan-500/30 bg-black/60 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex flex-col gap-8">
            
            <div class="flex flex-wrap justify-between gap-x-8 gap-y-6 mono text-[10px] md:text-xs uppercase tracking-widest border-b border-white/5 pb-8">
                <div class="flex flex-col gap-2 min-w-[140px]">
                    <span class="text-cyan-400/60">Phone</span>
                    <a href="tel:+962786324129" class="hover:text-cyan-400 transition inline-block [direction:ltr]">+962 78 632 4129</a>
                </div>
                <div class="flex flex-col gap-2 min-w-[140px]">
                    <span class="text-cyan-400/60">Email</span>
                    <a href="mailto:amsha@ieee.org" class="hover:text-cyan-400 transition lowercase">amsha@ieee.org</a>
                </div>
                <div class="flex flex-col gap-2 min-w-[140px]">
                    <span class="text-cyan-400/60">Instagram</span>
                    <a href="https://www.instagram.com/aess.aau" target="_blank" class="hover:text-cyan-400 transition">@aess.aau</a>
                </div>
                <div class="flex flex-col gap-2 min-w-[140px]">
                    <span class="text-cyan-400/60">Facebook</span>
                    <a href="https://www.facebook.com/share/1AwHbgQtMK/" target="_blank" class="hover:text-cyan-400 transition">AESS AAU </a>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="mono text-[8px] md:text-[9px] text-gray-600 tracking-[0.3em] uppercase">
                    &copy; 2026 IEEE AAU | ORBITAL_STATION_JOR
                </div>
                <div class="flex gap-6 text-gray-500 mono text-[8px] md:text-[9px] uppercase tracking-widest">
                    <div class="flex items-center gap-2">
                        <span class="w-1 h-1 bg-cyan-500 rounded-full animate-ping"></span>
                        <span class="text-cyan-500/50">System_Stable</span>
                    </div>
                    <span>Latency: 24ms</span>
                </div>
            </div>
        </div>
    </footer>

    <script>
        gsap.from("nav", {
            y: -50,
            opacity: 0,
            duration: 1.2,
            ease: "power3.out"
        });
        
        // تحريك سينمائي ناعم للبانر الفضائي عند تحميل الصفحة
        gsap.from("#mainContainer img", {
            scale: 0.95,
            opacity: 0,
            duration: 2,
            ease: "power2.out",
            delay: 0.3
        });
    </script>
</body>
</html>
