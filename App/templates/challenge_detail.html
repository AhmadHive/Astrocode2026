{% extends 'base.html' %}

{% block title %}ASTRO CODE 2026 | {{ challenge.name }}{% endblock %}

{% block content %}
<div class="w-full max-w-4xl mx-auto px-4 sm:px-6 md:px-0 flex flex-col items-center" dir="ltr">
    
    <div class="challenge-header w-full flex flex-col items-center text-center mb-8 md:mb-12 opacity-0">
        
        <div class="w-36 h-36 sm:w-44 sm:h-44 md:w-52 md:h-52 flex-shrink-0 border border-cyan-500/30 bg-black/40 backdrop-blur-xl rounded-xl mb-6 shadow-[0_0_50px_rgba(0,210,255,0.25)] overflow-hidden">
            <img src="{{ challenge.logo }}" alt="{{ challenge.name }} Logo" class="w-full h-full object-cover filter drop-shadow-[0_0_15px_rgba(0,210,255,0.4)]">
        </div>

        <span class="mono text-[10px] sm:text-xs uppercase tracking-[0.3em] text-cyan-500/60 block mb-2 font-bold">
            // MISSION_TRACK: <span class="text-white">{{ challenge.track.name }}</span>
        </span>
        
        <h4 class="text-2xl sm:text-4xl md:text-5xl font-black uppercase tracking-wider text-cyan-400 mb-6 drop-shadow-[0_0_20px_rgba(0,210,255,0.3)] max-w-2xl leading-tight line-clamp-2 block">
            {{ challenge.name }}
        </h4>
        
        <div class="h-px w-full bg-gradient-to-r from-transparent via-cyan-500/50 to-transparent"></div>
    </div>

    <div class="challenge-section w-full hull-border p-5 sm:p-6 md:p-8 text-left mb-32 opacity-0 bg-black/20 backdrop-blur-md">
        <div id="req-content" class="challenge-requirements text-gray-300 text-xs sm:text-sm md:text-base leading-relaxed font-mono break-words">
            {{ challenge.requirements|linebreaksbr }}
        </div>
    </div>
</div>

<style>
    /* التنسيق الصارم للعناوين */
    .cyber-bold {
        color: #00D2FF !important;
        font-weight: 900 !important;
        font-family: 'BABAPRO FONT BOLD', sans-serif;
        letter-spacing: 0.05em;
        display: inline-block;
        margin-top: 1.5rem;
        margin-bottom: 0.25rem;
        font-size: 0.95em;
    }
    
    .cyber-bold:first-child {
        margin-top: 0px !important;
    }

    /* كلاس الرابط السيبراني الجديد لضمان الحفاظ على الهوية البصرية واستجابة الشاشات */
    .cyber-link {
        color: #00D2FF !important;
        text-decoration: none !important;
        border-bottom: 1px dashed rgba(0, 210, 255, 0.4);
        padding-bottom: 1px;
        transition: all 0.3s ease;
        word-break: break-all;
        font-weight: bold;
    }

    .cyber-link:hover {
        color: #fff !important;
        border-bottom-style: solid;
        border-bottom-color: #fff;
        text-shadow: 0 0 8px rgba(0, 210, 255, 0.6);
    }

    @media (max-width: 480px) {
        .hull-border {
            clip-path: polygon(10px 0%, 100% 0%, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0% 100%, 0% 10px) !important;
        }
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const reqContainer = document.getElementById('req-content');
        if (reqContainer) {
            let rawHtml = reqContainer.innerHTML;
            
            // 1. استبدال العناوين المحاطة بـ ** ** أولاً
            const boldRegex = /\*\*(.*?)\*\*/g;
            rawHtml = rawHtml.replace(boldRegex, '<span class="cyber-bold">$1</span>');
            
            // 2. الكشف عن الروابط الخام وتحويلها برمجياً إلى وسوم تفاعلية آمنة ومتوافقة بصرياً
            const urlRegex = /(https?:\/\/[^\s<]+)/g;
            rawHtml = rawHtml.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer" class="cyber-link">⧉ $1</a>');
            
            reqContainer.innerHTML = rawHtml;
        }

        // تأثيرات GSAP السينمائية
        gsap.to(".challenge-header", {
            opacity: 1,
            y: 0,
            duration: 1.2,
            ease: "power3.out"
        });

        gsap.to(".challenge-section", {
            opacity: 1,
            y: 0,
            duration: 1,
            stagger: 0.2,
            ease: "power2.out",
            delay: 0.3
        });
    });
</script>
{% endblock %}
