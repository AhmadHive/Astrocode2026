{% extends 'base.html' %}

{% block content %}
<section class="min-h-[90vh] flex items-center justify-center px-4">
    <div class="relative w-full max-w-md group" id="login-portal">
        
        <div class="absolute -inset-1 bg-gradient-to-b from-transparent via-cyan-500/20 to-transparent h-full w-full pointer-events-none overflow-hidden z-20">
            <div class="w-full h-[2px] bg-cyan-400/50 shadow-[0_0_15px_rgba(0,210,255,0.5)] animate-[scan_4s_linear_infinite]"></div>
        </div>

        <div class="hull-border p-10 relative overflow-hidden bg-[#020408]/60 backdrop-blur-2xl">
            
            <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-cyan-500/50"></div>
            <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-cyan-500/50"></div>

            <header class="text-center mb-10">
                <div class="mono text-[10px] text-cyan-400 tracking-[0.5em] uppercase mb-2">Identification_Required</div>
                <h2 class="text-3xl font-black italic tracking-tighter uppercase">Access <span class="text-cyan-400">Portal</span></h2>
                <p class="text-gray-500 text-xs mono mt-2 uppercase tracking-widest">Awaiting Encrypted Credentials...</p>
            </header>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div class="relative group/input">
                    <label class="block mono text-[10px] text-gray-500 uppercase mb-2 ml-1 tracking-widest">Personnel_ID</label>
                    <input type="text" name="username" required
                           class="w-full bg-white/5 border border-white/10 px-4 py-3 rounded-none mono text-sm focus:outline-none focus:border-cyan-500/50 focus:bg-white/10 transition-all placeholder:text-gray-700"
                           placeholder="Enter Team ID...">
                    <div class="absolute bottom-0 left-0 h-[1px] w-0 bg-cyan-400 group-focus-within/input:w-full transition-all duration-500"></div>
                </div>

                <div class="relative group/input">
                    <label class="block mono text-[10px] text-gray-500 uppercase mb-2 ml-1 tracking-widest">Access_Key</label>
                    <input type="password" name="password" required
                           class="w-full bg-white/5 border border-white/10 px-4 py-3 rounded-none mono text-sm focus:outline-none focus:border-cyan-500/50 focus:bg-white/10 transition-all placeholder:text-gray-700"
                           placeholder="••••••••">
                    <div class="absolute bottom-0 left-0 h-[1px] w-0 bg-cyan-400 group-focus-within/input:w-full transition-all duration-500"></div>
                </div>

                <button type="submit" 
                        class="w-full relative py-4 mt-4 group/btn overflow-hidden transition-all">
                    <div class="absolute inset-0 bg-cyan-600/20 border border-cyan-500/50 group-hover/btn:bg-cyan-500 transition-colors"></div>
                    <span class="relative z-10 mono font-bold uppercase tracking-[0.3em] group-hover/btn:text-black transition-colors">
                        Initiate_Sequence
                    </span>
                    <div class="absolute top-0 left-[-100%] w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent skew-x-[-20deg] group-hover/btn:left-[100%] transition-all duration-700"></div>
                </button>
            </form>

            <footer class="mt-10 pt-6 border-t border-white/5 text-center">
                <div class="flex justify-center gap-4 opacity-30">
                    <div class="w-1 h-1 bg-white rounded-full"></div>
                    <div class="w-1 h-1 bg-white rounded-full"></div>
                    <div class="w-1 h-1 bg-white rounded-full"></div>
                </div>
                <p class="mono text-[8px] text-gray-600 mt-4 tracking-widest">SECURE_CHANNEL_v4.02 // ENCRYPTION: AES-256</p>
            </footer>
        </div>
    </div>
</section>

<style>
    @keyframes scan {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(1000%); }
    }
</style>

<script>
    // Entrance Animation for the Portal
    gsap.from("#login-portal", {
        duration: 2,
        y: 100,
        opacity: 0,
        scale: 0.95,
        ease: "expo.out",
        delay: 0.5
    });

    // Subtle float animation
    gsap.to("#login-portal", {
        duration: 4,
        y: "-=10",
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut"
    });
</script>
{% endblock %}
