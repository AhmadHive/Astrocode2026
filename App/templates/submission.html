{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<section class="min-h-screen flex items-center justify-center px-4 py-24 bg-[#020408]" dir="ltr">
    <div class="max-w-3xl w-full relative" id="submission-module">
        <div class="absolute inset-0 -m-10 md:-m-20 opacity-10 pointer-events-none overflow-hidden">
            <svg viewBox="0 0 100 100" class="w-full h-full stroke-cyan-500 fill-none" stroke-width="0.05"><polygon points="50,1 95,25 95,75 50,99 5,75 5,25" /></svg>
        </div>

        <div class="hull-border p-6 md:p-12 relative overflow-hidden bg-[#020408]/90 backdrop-blur-3xl shadow-[0_0_100px_rgba(0,0,0,0.8)] border border-white/5">
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                <div>
                    <div class="mono text-[10px] text-cyan-400 tracking-[0.5em] uppercase">Payload_Deployment</div>
                    <h2 class="text-3xl md:text-4xl font-black italic tracking-tighter uppercase mt-2 text-white">Mission <span class="text-cyan-400">Submission</span></h2>
                </div>
            </div>

            <div class="mb-8 p-4 border-l-2 border-yellow-500/50 bg-yellow-500/5 flex items-start gap-4">
                <span class="text-yellow-500 animate-pulse font-bold">!</span>
                <p class="text-[10px] md:text-xs text-gray-400 mono uppercase tracking-wider leading-relaxed">
                    Ensure Google Drive link is set to <span class="text-yellow-500 font-bold">"Anyone with the link"</span> for orbital verification.
                </p>
            </div>

            <form method="post" class="space-y-8" id="payload-form">
                {% csrf_token %}
                
                <div class="relative group/field">
                    <label class="block mono text-[10px] text-gray-500 uppercase mb-3 ml-1 tracking-[0.2em]">Mission_Briefing</label>
                    <textarea name="{{ form.description.name }}" id="{{ form.description.auto_id }}" rows="6" maxlength="1000" class="w-full bg-white/5 border border-white/10 p-5 text-white focus:border-cyan-500 outline-none transition-all resize-none"></textarea>
                    <div id="counter" class="absolute bottom-4 right-4 mono text-[9px] text-gray-500">0000 / 1000_CHAR</div>
                </div>

                <div class="relative group/field">
                    <label class="block mono text-[10px] text-gray-500 uppercase mb-3 ml-1 tracking-[0.2em]">Select_Challenge</label>
                    <select name="{{ form.challenge.name }}" id="challenge-select" required>
                        {% for value, label in form.challenge.field.choices %}
                            <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="relative group/field">
                    <label class="block mono text-[10px] text-gray-500 uppercase mb-3 ml-1 tracking-[0.2em]">Uplink_URL</label>
                    <input type="url" name="{{ form.drive_link.name }}" required class="w-full bg-white/5 border border-white/10 p-4 text-white focus:border-cyan-500 outline-none transition-all">
                </div>

                <button type="submit" id="submit-btn" class="w-full py-5 border border-cyan-500/30 text-white font-black uppercase tracking-[0.5em] hover:border-cyan-400 hover:bg-cyan-500/10 transition-all">
                    <span id="btn-text">Transmit_Payload</span>
                </button>
            </form>
        </div>
    </div>
</section>

<style>
    .choices__inner { background-color: #020408 !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 0 !important; min-height: 50px !important; }
    .choices__list--dropdown { background-color: #000 !important; border: 1px solid #06b6d4 !important; border-radius: 0 !important; }
    .choices__item--selectable { color: #fff !important; }
    .choices__item--selectable:hover { background-color: #06b6d4 !important; color: #000 !important; }
    .choices[data-type*=select-one]::after { border-color: #06b6d4 transparent transparent transparent !important; }
</style>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        new Choices(document.getElementById('challenge-select'), { searchEnabled: false, itemSelectText: '' });
        
        const textArea = document.querySelector('textarea');
        const counter = document.getElementById('counter');
        textArea.addEventListener('input', () => {
            counter.textContent = `${textArea.value.length.toString().padStart(4, '0')} / 1000_CHAR`;
        });

        gsap.from("#submission-module", { duration: 1.2, scale: 0.95, opacity: 0, y: 30, ease: "power3.out" });
    });
</script>
{% endblock %}
