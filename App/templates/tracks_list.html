{% extends 'base.html' %}

{% block content %}
<section class="min-h-screen pt-32 pb-20 px-6">
    <div class="max-w-7xl mx-auto">
        <header class="mb-16">
            <div class="mono text-[10px] text-cyan-400 tracking-[0.5em] uppercase mb-2">Navigation_System</div>
            <h2 class="text-5xl font-black italic tracking-tighter uppercase">Mission <span class="text-cyan-400">Tracks</span></h2>
            <div class="h-[1px] w-full bg-gradient-to-r from-cyan-500/30 to-transparent mt-4"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="track-grid">
            {% for track in tracks %}
            <a href="{% url 'track_detail' track.id %}" class="group track-card">
                <div class="hull-border p-8 h-full relative overflow-hidden transition-all duration-500 hover:border-cyan-500/60 bg-[#020408]/60 backdrop-blur-xl hover:-translate-y-2">
                    
                    <div class="mb-8 flex justify-between items-start">
                        <div class="w-16 h-16 border border-white/10 rounded-xl flex items-center justify-center bg-white/5 overflow-hidden p-2">
                            {% if track.logo %}
                                <img src="{{ track.logo.url }}" alt="{{ track.name }}" class="w-full h-full object-contain filter grayscale group-hover:grayscale-0 transition-all duration-500">
                            {% else %}
                                <div class="mono text-[8px] text-gray-700">NO_LOGO</div>
                            {% endif %}
                        </div>
                        <div class="mono text-[8px] text-gray-600 uppercase tracking-widest px-2 py-1 border border-white/5">Sector_0{{ forloop.counter }}</div>
                    </div>

                    <h3 class="text-2xl font-bold italic uppercase mb-4 group-hover:text-cyan-400 transition-colors tracking-tighter">{{ track.name }}</h3>
                    <p class="text-sm text-gray-400 leading-relaxed mb-10 line-clamp-3 mono">
                        {{ track.description }}
                    </p>

                    <div class="flex items-center gap-3 mono text-[10px] text-cyan-500/50 group-hover:text-cyan-400 transition-colors mt-auto">
                        <span class="tracking-[0.3em]">INITIALIZE_DOCKING</span>
                        <span class="translate-x-0 group-hover:translate-x-3 transition-transform duration-300">→</span>
                    </div>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</section>

<script>
    gsap.from(".track-card", {
        duration: 1.2,
        opacity: 0,
        y: 50,
        stagger: 0.15,
        ease: "expo.out",
        clearProps: "all"
    });
</script>
{% endblock %}
